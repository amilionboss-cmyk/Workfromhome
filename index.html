<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Redirect Page</title>

  <!-- Open Graph tags -->
  <meta property="og:title" content="My Special Link">
  <meta property="og:description" content="Click the image or link to view the content.">
  <meta property="og:image" content="https://i.postimg.cc/8cTbzMBJ/Screenshot-20260130-125617-1.jpg">
  <meta property="og:image:alt" content="Screenshot preview">
  <meta property="og:url" content="https://shorturl.at/DOJrI">
  <meta property="og:type" content="website">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="My Special Link">
  <meta name="twitter:description" content="Click the image or link to view the content.">
  <meta name="twitter:image" content="https://i.postimg.cc/8cTbzMBJ/Screenshot-20260130-125617-1.jpg">

  <link rel="canonical" href="https://shorturl.at/DOJrI">

  <style>
    :root { --max-width: 720px; --gap: 18px; }
    html,body { height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial; background:#f7f7f8; color:#111; }
    .wrap { min-height:100%; display:flex; align-items:center; justify-content:center; padding:32px; box-sizing:border-box; }
    .card { max-width:var(--max-width); width:100%; text-align:center; background:#fff; border-radius:12px; box-shadow:0 6px 24px rgba(16,24,40,0.08); padding:24px; }
    .preview { display:block; margin:0 auto var(--gap); max-width:100%; height:auto; border-radius:8px; border:1px solid #e6e6e9; cursor:pointer; }
    .btn { display:inline-block; padding:10px 18px; background:#1da1f2; color:#fff; text-decoration:none; border-radius:8px; font-weight:600; }
    .note { margin-top:12px; color:#555; font-size:0.95rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <h1>Open content</h1>

      <!-- Clickable preview image (immediate navigation) -->
      <a href="https://shorturl.at/DOJrI" rel="noopener noreferrer">
        <img class="preview" src="https://i.postimg.cc/8cTbzMBJ/Screenshot-20260130-125617-1.jpg" alt="Screenshot preview">
      </a>

      <p>
        <a class="btn" href="https://shorturl.at/DOJrI" rel="noopener noreferrer">Open content</a>
      </p>

      <p class="note">Click the image or the button to go to the content immediately.</p>
    </div>
  </div>

  <noscript>
    <p style="text-align:center; padding:20px;">
      JavaScript is disabled. <a href="https://shorturl.at/DOJrI">Click here to continue</a>.
    </p>
  </noscript>
</body>
</html>

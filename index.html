<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting…</title>

  <!-- Open Graph tags for social preview -->
  <meta property="og:title" content="My Special Link">
  <meta property="og:description" content="Click to view the content.">
  <meta property="og:image" content="https://i.postimg.cc/8cTbzMBJ/Screenshot-20260130-125617-1.jpg">
  <meta property="og:image:alt" content="Screenshot preview">
  <meta property="og:url" content="https://shorturl.at/DOJrI">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="My Special Link">
  <meta name="twitter:description" content="Click to view the content.">
  <meta name="twitter:image" content="https://i.postimg.cc/8cTbzMBJ/Screenshot-20260130-125617-1.jpg">

  <!-- Immediate redirect (server-side friendly) -->
  <meta http-equiv="refresh" content="0; url=https://shorturl.at/DOJrI">

  <!-- JavaScript fallback for immediate redirect -->
  <script>
    (function(){
      try {
        window.location.replace("https://shorturl.at/DOJrI");
      } catch (e) {
        window.location.href = "https://shorturl.at/DOJrI";
      }
    })();
  </script>
</head>
<body>
  <!-- Intentionally empty: page exists only to provide social preview metadata and perform an immediate redirect. -->
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ozii's Hustle Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      background-color: #f4f4f4;
    }
    h1 {
      color: #333;
    }
    p {
      font-size: 18px;
      color: #555;
    }
  </style>
  <script>
    const links = [
      "https://singingfiles.com/show.php?l=0&u=2467240&id=72940",
      "https://doctoredits.com/show.php?l=0&u=2467240&id=74033",
      "https://ridefiles.net/show.php?l=0&u=2467240&id=73794",
      "https://singingfiles.com/show.php?l=0&u=2467240&id=72846"
    ];

    const lastLink = localStorage.getItem("lastRedirect");
    let availableLinks = links.filter(link => link !== lastLink);
    if (availableLinks.length === 0) availableLinks = [...links];

    const randomLink = availableLinks[Math.floor(Math.random() * availableLinks.length)];
    localStorage.setItem("lastRedirect", randomLink);

    let countdown = 5;
    function updateCountdown() {
      document.getElementById("countdown").textContent = countdown;
      if (countdown === 0) {
        window.location.href = randomLink;
      } else {
        countdown--;
        setTimeout(updateCountdown, 1000);
      }
    }

    window.onload = updateCountdown;
  </script>
</head>
<body>
  <h1>Welcome to Ozii’s Hustle Hub</h1>
  <p>Redirecting you to the best online job in <span id="countdown">5</span> seconds…</p>
</body>
</html>
